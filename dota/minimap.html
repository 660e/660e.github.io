<!doctype html>
<html>

<head>
  <meta charset="utf-8">
  <title>minimap</title>
  <style>
  * {
    margin: 0;
    padding: 0;
  }

  body {
    background-color: #000;
    font-family: consolas, "microsoft yahei";
    font-size: 12px;
    color: #fff;
    overflow: hidden;
  }

  .map {
    background: url(static/minimap.png) no-repeat;
    width: 1024px;
    height: 1024px;
    margin: auto;
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
  }

  .map .s,
  .map .e {
    height: 16px;
    line-height: 16px;
    width: 16px;
    text-align: center;
    border: 1px #fff solid;
    border-radius: 50%;
    position: absolute;
  }

  .map .s {
    background-color: rgba(0, 204, 0, 0.7);
  }

  .map .e {
    background-color: rgba(204, 0, 0, 0.7);
  }

  .map ul {
    list-style: none;
    position: absolute;
  }

  .map li {
    height: 14px;
    line-height: 14px;
    width: 18px;
    text-align: center;
    text-shadow: 0 0 10px #000;
  }
  </style>
</head>

<body>
  <div id="app">
    <div class="map">
      <div v-for="item in store">
        <div class="s" v-text="item.text" :style="{ top: item.origin.x + 'px', left: item.origin.y + 'px' }"></div>
        <div class="e" v-text="item.text" :style="{ top: item.finish.x + 'px', left: item.finish.y + 'px' }"></div>
        <ul :style="{ top: item.origin.x + 20 + 'px', left: item.origin.y + 'px' }">
          <li v-for="p in item.list" v-text="p"></li>
        </ul>
      </div>
    </div>
  </div>
  <script src="https://unpkg.com/vue@2.5.16/dist/vue.js"></script>
  <script>
  const app = new Vue({
    el: '#app',
    data: {
      store: [{
        text: 'A',
        origin: { x: 520, y: 205 },
        finish: { x: 480, y: 150 },
        list: [56, 54],
        position: 'bottom'
      }]
    }
  });
  </script>
</body>

</html>
